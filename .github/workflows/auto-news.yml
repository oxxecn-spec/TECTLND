name: Auto Generate Articles JSON from /news/

on:
  push:
    paths:
      - 'news/*.html'           # 当 news 文件夹下任何 .html 文件变化时触发
  workflow_dispatch:            # 允许手动触发（方便测试）

jobs:
  scan-and-generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write           # 授予写入权限，以便提交 articles.json
    steps:
      - uses: actions/checkout@v4
      
      - name: Extract titles & descriptions from HTML files in /news/
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');
          const newsDir = './news';
          if (!fs.existsSync(newsDir)) {
            console.log('No news folder, creating empty articles.json');
            fs.writeFileSync('./articles.json', '[]');
            process.exit(0);
          }
          const files = fs.readdirSync(newsDir).filter(f => f.endsWith('.html') && f !== 'news.html');
          const articles = [];
          for (const file of files) {
            const content = fs.readFileSync(path.join(newsDir, file), 'utf8');
            // 提取标题
            const titleMatch = content.match(/<title>(.*?)<\/title>/i);
            // 提取描述
            const descMatch = content.match(/<meta\s+name=['\"]description['\"]\s+content=['\"]?(.*?)['\"]?[\s>]/i);
            // 可选：提取自定义日期（若文章内无此 meta，则用文件修改时间）
            const dateMatch = content.match(/<meta\s+name=['\"]date['\"]\s+content=['\"]?(.*?)['\"]?[\s>]/i);
            let articleDate = '';
            if (dateMatch && dateMatch[1]) {
              articleDate = dateMatch[1].trim();
            } else {
              const stats = fs.statSync(path.join(newsDir, file));
              articleDate = stats.mtime.toISOString().slice(0, 10);
            }
            articles.push({
              title: titleMatch ? titleMatch[1].trim() : file.replace('.html', ''),
              description: descMatch ? descMatch[1].trim() : '',
              link: '/news/' + file,
              date: articleDate
            });
          }
          // 按日期倒序排序（最新在前）
          articles.sort((a,b) => (a.date < b.date ? 1 : -1));
          fs.writeFileSync('./articles.json', JSON.stringify(articles, null, 2));
          console.log('Generated articles.json with', articles.length, 'articles');
          "
      - name: Commit and push articles.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add articles.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto update articles.json from /news/"
          git push
