<script>
    // ... 菜单切换和微信复制代码保持不变 ...

    // 加载文章列表
    const container = document.getElementById('articles-grid-container');
    if (!container) {
        console.error('Container #articles-grid-container not found');
    } else {
        fetch('/articles.json')
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                return response.json();
            })
            .then(articles => {
                if (!articles || articles.length === 0) {
                    container.innerHTML = '<div class="loading-placeholder">📭 No articles yet. Check back soon.</div>';
                    return;
                }
                // 按日期倒序排序
                const sorted = [...articles].sort((a, b) => (a.date < b.date ? 1 : -1));
                container.innerHTML = sorted.map(article => `
                    <a href="${article.link}" class="article-card">
                        <div class="article-body">
                            <div class="article-meta">
                                <span><i class="far fa-calendar-alt"></i> ${article.date || 'Upcoming'}</span>
                            </div>
                            <h3 class="article-title">${escapeHtml(article.title)}</h3>
                            <p class="article-description">${escapeHtml(article.description || 'Click to read full article.')}</p>
                            <div class="read-more">
                                Read full article <i class="fas fa-arrow-right"></i>
                            </div>
                        </div>
                    </a>
                `).join('');
            })
            .catch(error => {
                console.error('Fetch failed:', error);
                container.innerHTML = `<div class="loading-placeholder" style="color: #c00;">⚠️ Failed to load articles: ${error.message}. Please refresh or contact support.</div>`;
            });
    }

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
